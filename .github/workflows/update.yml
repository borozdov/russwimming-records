name: Daily update

on:
  schedule:
    - cron: '0 6 * * *'   # каждый день в 06:00 UTC (09:00 МСК)
  workflow_dispatch:        # можно запустить вручную

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch records
        run: python scripts/fetch.py

      - name: Build site
        run: python scripts/build.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/russia.json \
                  public/index.html \
                  public/records.json \
                  public/records.csv \
                  public/records.xlsx \
                  public/records.md \
                  public/records.txt
          git diff --cached --quiet \
            || git commit -m "data: update records $(date -u +%Y-%m-%d)" \
            && git push
